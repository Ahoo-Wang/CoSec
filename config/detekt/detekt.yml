# TODO Compliance
complexity:
  LongParameterList:
    active: false
  NestedBlockDepth:
    active: false
  TooManyFunctions:
    active: false
style:
  MaxLineLength:
    maxLineLength: 200
  ReturnCount:
    active: false
  UseCheckOrError:
    active: false
  UnusedPrivateMember:
    active: false
  ProtectedMemberInFinalClass:
    active: false
  MagicNumber:
    active: false
  UnnecessaryAbstractClass:
    active: false
  LoopWithTooManyJumpStatements:
    active: false
  WildcardImport:
    excludeImports:
      - java.util.*
      - org.hamcrest.Matchers.*
      - org.hamcrest.MatcherAssert.*
      - org.junit.jupiter.api.Assertions.*
naming:
  MemberNameEqualsClassName:
    active: false
  MatchingDeclarationName:
    active: false
exceptions:
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - TooManyRequestsException
  TooGenericExceptionCaught:
    active: true
    excludes:
      - "**/DefaultPolicyEvaluator.kt"
      - "**/SecurityContextParser.kt"
      - "**/LocalPolicyLoader.kt"
      - "**/Ip2RegionRequestAttributesAppender.kt"
      - "**/AuthorizationFilter.kt"

  ThrowingExceptionsWithoutMessageOrCause:
    active: false
performance:
  SpreadOperator:
    active: false
formatting:
  NoWildcardImports:
    packagesToUseImportOnDemandProperty: "java.util.*,org.hamcrest.Matchers.*,org.hamcrest.MatcherAssert.*,org.junit.jupiter.api.Assertions.*"
  MaximumLineLength:
    active: false
  Filename:
    active: false
